<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c47c"/>
      <stop offset="100%" stop-color="#d4a055"/>
    </linearGradient>
  </defs>

  <!-- Two overlapping circles (two people's libraries) -->
  <!-- Left circle -->
  <circle cx="40" cy="50" r="24" fill="none" stroke="#e8c47c" stroke-width="1.8" opacity="0.6"/>

  <!-- Right circle -->
  <circle cx="60" cy="50" r="24" fill="none" stroke="#e8c47c" stroke-width="1.8" opacity="0.6"/>

  <!-- The vesica piscis / overlap zone highlighted -->
  <clipPath id="clipLeft">
    <circle cx="40" cy="50" r="24"/>
  </clipPath>
  <clipPath id="clipRight">
    <circle cx="60" cy="50" r="24"/>
  </clipPath>

  <!-- Fill only the intersection -->
  <circle cx="60" cy="50" r="24" fill="#e8c47c" opacity="0.12" clip-path="url(#clipLeft)"/>

  <!-- Sound wave / EQ bars inside the intersection -->
  <g opacity="0.8">
    <rect x="46" y="44" width="2" height="12" rx="1" fill="url(#g)"/>
    <rect x="50" y="40" width="2" height="20" rx="1" fill="url(#g)"/>
    <rect x="54" y="42" width="2" height="16" rx="1" fill="url(#g)"/>
  </g>
</svg>
